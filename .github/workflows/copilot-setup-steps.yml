 name: Copilot Setup Steps
 
 on:
   workflow_dispatch:
   push:
     paths:
       - .github/workflows/copilot-setup-steps.yml
   pull_request:
     paths:
       - .github/workflows/copilot-setup-steps.yml
 
 jobs:
   copilot-setup-steps:
     runs-on: ubuntu-latest
     timeout-minutes: 45
     permissions:
       contents: read
     steps:
       - name: Checkout repository
         uses: actions/checkout@v5
 
       - name: Set up Python
         uses: actions/setup-python@v6
         with:
           python-version: "3.11"
           cache: "pip"
           cache-dependency-path: |
             requirements.txt
             requirements-ci.txt
 
       - name: Set up Node.js
         uses: actions/setup-node@v6
         with:
           node-version: "20"
           cache: "npm"
           cache-dependency-path: apps/dsa-web/package-lock.json
 
       - name: Install system packages for Markdown-to-image flows
         run: |
           if command -v wkhtmltoimage >/dev/null 2>&1 || command -v wkhtmltopdf >/dev/null 2>&1; then
             echo "wkhtmltopdf already available"
             exit 0
           fi
           sudo apt-get update
           sudo apt-get install -y --no-install-recommends wkhtmltopdf
 
       - name: Install backend dependencies
         run: |
           python -m pip install --upgrade pip
           for attempt in 1 2 3; do
             if python -m pip install -r requirements-ci.txt; then
               break
             fi
             if [ "$attempt" -eq 3 ]; then
               echo "Dependency install failed after ${attempt} attempts." >&2
               exit 1
             fi
             echo "Dependency install attempt ${attempt} failed, retrying in 15s..." >&2
             sleep 15
           done
 
       - name: Install web dependencies
         working-directory: apps/dsa-web
         run: npm ci
 
       - name: Prepare runtime directories
         run: mkdir -p data logs reports
 
       - name: Show prepared toolchain
         run: |
           python --version
           node --version
           npm --version
           if command -v wkhtmltoimage >/dev/null 2>&1; then
             wkhtmltoimage --version
           elif command -v wkhtmltopdf >/dev/null 2>&1; then
             wkhtmltopdf --version
           fi
